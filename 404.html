<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — LeetCode Daily</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="site-header" role="banner">
    <nav class="nav container" aria-label="Main navigation">
      <a href="/" class="nav-brand" aria-label="LeetCode Daily home">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
          <path d="M9 16l4 4 10-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#9B6DFF"/><stop offset="1" stop-color="#6366F1"/></linearGradient></defs>
        </svg>
        LeetCode Daily
      </a>
    </nav>
  </header>

  <main class="page-404" id="main-generic-404">
    <div>
      <h1>404</h1>
      <p>This page doesn't exist. Maybe the problem was too hard.</p>
      <a href="/" class="btn-home">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        Back to Home
      </a>
    </div>
  </main>

  <main class="referral-page" id="main-referral" hidden>
    <div class="container">
      <div id="referral-root-404"></div>
    </div>
  </main>

  <script src="/referral.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', function () {
      if (!window.Referral) return;
      var code = Referral.getCode();
      if (!code) return;
      var generic = document.getElementById('main-generic-404');
      var referral = document.getElementById('main-referral');
      var root = document.getElementById('referral-root-404');
      if (!generic || !referral || !root) return;
      generic.hidden = true;
      referral.hidden = false;
      Referral.init(root);
    });
  </script>

</body>
</html>
